<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>GlobalBuy24</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="" name="keywords">
        <meta
        content="" name="description">

        <!-- Favicon -->
        <link
        href="img/favicon.ico" rel="icon">

        <!-- Google Web Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500&family=Jost:wght@500;600;700&display=swap" rel="stylesheet">

        <!-- Icon Font Stylesheet -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
        <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

        <!-- Libraries Stylesheet -->
        <link href="lib/animate/animate.min.css" rel="stylesheet">
        <link
        href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

        <!-- Customized Bootstrap Stylesheet -->
        <link
        href="css/bootstrap.min.css" rel="stylesheet">

        <!-- Template Stylesheet -->
        <link href="css/style.css" rel="stylesheet">
    </head>
    <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
        <h5 class="text-primary-gradient fw-medium">Get in Touch</h5>
        <h1 class="mb-5" data-translate="contactTitle">Contact Us</h1>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="wow fadeInUp" data-wow-delay="0.3s">
                <p class="text-center mb-4" data-translate="contactSubtitle">Have questions about our
                                                        service? Our team is here to help
                                                        you with any inquiries about international shopping, delivery, or payment options.
                </p>
                <form>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="name" placeholder="Your Name">
                                <label for="name" data-translate="name">Your Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" placeholder="Your Email">
                                <label for="email" data-translate="email">Your Email</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="subject" placeholder="Subject">
                                <label for="subject" data-translate="subject">Subject</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <textarea class="form-control" placeholder="Leave a message here" id="message" style="height: 150px"></textarea>
                                <label for="message" data-translate="message">Your Message</label>
                            </div>
                        </div>
                        <div class="col-12 text-center">
                            <button class="btn btn-primary-gradient rounded-pill py-3 px-5" type="submit" data-translate="sendMessage">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</html>
